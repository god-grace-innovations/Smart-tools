<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Field value extractor</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>
  <body>
    <div style="height: 1px; width: 360px; background: gray;"></div>
    <div class="Alert" id="customAlert">
    
    </div>
    <main>
      <div class="Extract-uername">
        <h2>Extract Uername</h2>
        <div class="Result">
          <textarea placeholder="Result..." id="result"></textarea>
        </div>
        <div class="Wrap1">
          <input placeholder="Field from" type="text" value="" id="fieldFrom" />
          <input placeholder="Field to (Optional)" type="text" value="" id="fieldTo" />
        </div>
        <div class="Wrap4">
          <input type="file" value="" id="selectFile" multiple="true" />
        </div>
        <h3>Max row length</h3>
        <div class="Wrap2 inputSelect" onclick="resetActive(this, 'button', true)" id="rowLength">
          <button>
            <input type="checkbox" id="Max" value="Max" />
            <label for="Max">All</label>
          </button>
          <button class="active">
            <input type="checkbox" id="1000" value="100" checked="true" />
            <label for="1000">1000</label>
          </button>
          <button>
            <input type="checkbox" id="2000" value="2000" />
            <label for="2000">2000</label>
          </button>
          <button>
            <input type="checkbox" id="3000" value="3000" />
            <label for="3000">3000</label>
          </button>
          <button>
            <input type="checkbox" id="4000" value="4000" />
            <label for="4000">4000</label>
          </button>
          <button>
            <input type="checkbox" id="5000" value="5000" />
            <label for="5000">5000</label>
          </button>
          <button>
            <input type="checkbox" id="6000" value="5000" />
            <label for="6000">6000</label>
          </button>
        </div>
        <h3>Format to email</h3>
        <div class="Wrap2 inputSelect" onclick="resetActive(this, 'button', true)" id="emailHost">
          <button class="active">
            <input type="checkbox" value="" id="False" checked="true" />
            <label for="False">False</label>
          </button>
          <button>
            <input type="checkbox" value="@yahoo.com" id="YahooMail" />
            <label for="YahooMail">Yahoo mail</label>
          </button>
          <button>
            <input type="checkbox" value="@yahoo.com" id="outlook" />
            <label for="outlook">Outlook</label>
          </button>
          <button>
            <input type="checkbox" value="@gmail.com" id="gmail" />
            <label for="gmail">Gmail</label>
          </button>
          <button>
            <input type="checkbox" value="@gmx.com" id="GMX" />
            <label for="GMX">GMX</label>
          </button>
        </div>
        <h3>Rows (Result)</h3>
        <div class="Wrap3 btnSelect" onclick="resetActive(this, 'button.active')" id="resultRows">
          <button class="active">R1</button>
        </div>
        <div class="Wrap5">
          <button onclick="" class="blink">Reset</button>
          <button onclick="extractUsername()" class="blink">Extract</button>
        </div>
      </div>
    </main>
    <script src="functions.js" type="text/javascript"></script>
    <script src="index.js" type="module"></script>
  </body>
</html>
